<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - YGO Progression Series App</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="subpage-body">
  <div class="video-background">
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="../assets/video/background.mp4" type="video/mp4" />
    </video>
    <div class="video-overlay"></div>
  </div>

  <div class="app-shell subpage-shell">
    <header class="subpage-header">
      <a href="../index.html" class="back-button">← Back to Main Menu</a>
      <div class="version-tag">v0.1.0</div>
      <h1 class="subpage-title">Admin Panel</h1>
    </header>

    <main class="subpage-content admin-page-content">
      <section class="admin-page-shell">
        <article class="admin-intro-panel">
          <h2>League Management</h2>
          <p>
            Manage player credits, grant keys and tokens, remove inventory items,
            and export or import local progression save data.
          </p>
        </article>

        <section class="admin-layout">
          <div class="admin-main-column">
            <section class="admin-panel">
              <div class="admin-panel-header">
                <h3>Player Controls</h3>
              </div>

              <div class="admin-form-grid">
                <div class="admin-field">
                  <label for="adminPlayerSelect">Selected Player</label>
                  <select id="adminPlayerSelect" class="admin-select">
                    <option value="1">QaMazi</option>
                    <option value="2">SKX</option>
                    <option value="3">Silverwolf</option>
                    <option value="4">Blu</option>
                    <option value="5">Nightmare</option>
                    <option value="6">N/A</option>
                  </select>
                </div>

                <div class="admin-status-card">
                  <span class="admin-status-label">Current Credits</span>
                  <div id="adminCurrentCredits" class="admin-status-value">100</div>
                </div>
              </div>

              <div class="admin-subsection">
                <h4>Edit Credits</h4>
                <div class="admin-inline-grid">
                  <div class="admin-field">
                    <label for="adminCreditAmount">Amount</label>
                    <input id="adminCreditAmount" class="admin-number-input" type="number" min="0" value="10" />
                  </div>

                  <div class="admin-action-group">
                    <button id="adminAddCreditsButton" class="promo-action-button" type="button">Add Credits</button>
                    <button id="adminRemoveCreditsButton" class="secondary-action-button" type="button">Remove Credits</button>
                    <button id="adminSetCreditsButton" class="secondary-action-button" type="button">Set Credits</button>
                  </div>
                </div>
              </div>

              <div class="admin-subsection">
                <h4>Give Rewards</h4>
                <div class="admin-action-group">
                  <button id="adminGiveRandomKeyButton" class="promo-action-button" type="button">Give Random Key</button>

                  <div class="admin-specific-key-wrap">
                    <label for="adminSpecificKeyBoxSelect">Specific Key Box</label>
                    <select id="adminSpecificKeyBoxSelect" class="admin-select">
                      <option value="1">Arcade Relics</option>
                      <option value="2">Chaos Gamble</option>
                      <option value="3">Vault of Supremacy</option>
                    </select>
                  </div>

                  <button id="adminGiveSpecificKeyButton" class="promo-action-button" type="button">Give Specific Key</button>
                  <button id="adminGiveFeatureTokenButton" class="promo-action-button" type="button">Give Feature Token</button>
                </div>
              </div>

              <div id="adminMessage" class="admin-message"></div>
            </section>
          </div>

          <aside class="admin-side-column">
            <section class="admin-panel">
              <div class="admin-panel-header">
                <h3>Inventory Manager</h3>
              </div>

              <div class="admin-field">
                <label for="adminInventorySelect">Remove Inventory Item</label>
                <select id="adminInventorySelect" class="admin-select">
                  <option value="">No items available</option>
                </select>
              </div>

              <button id="adminRemoveInventoryItemButton" class="secondary-action-button danger-button admin-full-button" type="button">
                Remove Selected Item
              </button>
            </section>

            <section class="admin-panel">
              <div class="admin-panel-header">
                <h3>App Data</h3>
              </div>

              <div class="admin-data-actions">
                <button id="adminExportSaveButton" class="promo-action-button" type="button">Export Save</button>

                <label for="adminImportSaveInput" class="admin-file-label">Choose Save File</label>
                <input id="adminImportSaveInput" class="admin-file-input" type="file" accept=".json" />

                <button id="adminImportSaveButton" class="secondary-action-button" type="button">Import Save</button>
                <button id="adminResetAllDataButton" class="secondary-action-button danger-button" type="button">Reset All Data</button>
              </div>
            </section>
          </aside>
        </section>
      </section>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/playerstate.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
