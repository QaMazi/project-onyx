<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Number Generator - YGO Progression Series App</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="subpage-body">
  <div class="video-background">
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="../assets/video/background.mp4" type="video/mp4" />
    </video>
    <div class="video-overlay"></div>
  </div>

  <div class="app-shell subpage-shell">
    <header class="subpage-header">
      <a href="../index.html" class="back-button">← Back to Main Menu</a>
      <div class="version-tag">v0.1.0</div>
      <h1 class="subpage-title">Random Number Generator</h1>
    </header>

    <main class="subpage-content">
      <section class="rng-panel">
        <div class="rng-panel-header">
          <h2>Generate a Number</h2>
          <p>Enter a minimum and maximum value, then generate a random result.</p>
        </div>

        <div class="rng-form">
          <div class="rng-field">
            <label for="minValue">Minimum Number</label>
            <input type="number" id="minValue" placeholder="Enter minimum" />
          </div>

          <div class="rng-field">
            <label for="maxValue">Maximum Number</label>
            <input type="number" id="maxValue" placeholder="Enter maximum" />
          </div>

          <button id="generateNumberButton" class="menu-button rng-generate-button">
            Generate
          </button>
        </div>

        <div class="rng-result-wrap">
          <span class="rng-result-label">Result</span>
          <div id="rngResult" class="rng-result-display">--</div>
        </div>

        <div id="rngError" class="rng-error-message"></div>
      </section>
    </main>

    <footer class="sponsor-strip">
      <div class="sponsor-item">
        <img src="../assets/logos/gentlemens-gaming.png" alt="Gentlemen's Gaming" />
      </div>

      <div class="sponsor-item">
        <img src="../assets/logos/ygoprog.png" alt="YGOprog.com" />
      </div>

      <div class="sponsor-item">
        <img src="../assets/logos/ygoomega.png" alt="YGOOmega" />
      </div>

      <div class="sponsor-item">
        <img src="../assets/logos/progression-series.png" alt="Progression Series Logo" />
      </div>
    </footer>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/rng.js"></script>
</body>
</html>
