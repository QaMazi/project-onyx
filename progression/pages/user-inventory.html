<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Inventory - YGO Progression Series App</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="subpage-body">
  <div class="video-background">
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="../assets/video/background.mp4" type="video/mp4" />
    </video>
    <div class="video-overlay"></div>
  </div>

  <div class="app-shell subpage-shell">
    <header class="subpage-header">
      <a href="../index.html" class="back-button">← Back to Main Menu</a>
      <div class="version-tag">v0.1.0</div>
      <h1 class="subpage-title">User Inventory</h1>
    </header>

    <main class="subpage-content inventory-page-content">
      <section class="inventory-page-shell">
        <article class="inventory-intro-panel">
          <h2>Player Credits & Inventory</h2>
          <p>
            View each player's current credits and all stored usable items,
            including keys and Feature Card Tokens.
          </p>
        </article>

        <section id="inventoryGrid" class="inventory-grid">
          <!-- Populated by inventory.js -->
        </section>
      </section>
    </main>

    <footer class="sponsor-strip">
      <div class="sponsor-item">
        <img src="../assets/logos/gentlemens-gaming.png" alt="Gentlemen's Gaming" />
      </div>

      <div class="sponsor-item">
        <img src="../assets/logos/ygoprog.png" alt="YGOprog.com" />
      </div>

      <div class="sponsor-item">
        <img src="../assets/logos/ygoomega.png" alt="YGOOmega" />
      </div>

      <div class="sponsor-item">
        <img src="../assets/logos/progression-series.png" alt="Progression Series Logo" />
      </div>
    </footer>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/playerState.js"></script>
  <script src="../js/inventory.js"></script>
</body>
</html>
