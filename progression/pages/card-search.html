<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Search</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/card-search.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/database.js"></script>
  <script defer src="../js/card-search.js"></script>
</head>
<body class="subpage-body">

  <div class="video-background">
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="../assets/video/background.mp4" type="video/mp4" />
    </video>
    <div class="video-overlay"></div>
  </div>

  <div class="subpage-shell card-search-page-shell">
    <header class="subpage-header">
      <a href="../index.html" class="back-button">← Back</a>
      <h1 class="subpage-title">Card Search</h1>
    </header>

    <main class="subpage-content card-search-page-content">
      <section class="card-search-layout">

        <section class="card-browser-panel">
          <div class="card-browser-toolbar">
            <div class="card-toolbar-group">
              <label for="sortBySelect">Sort By</label>
              <select id="sortBySelect" class="card-search-select">
                <option value="name">Name</option>
                <option value="level">Level</option>
                <option value="atk">ATK</option>
                <option value="def">DEF</option>
                <option value="attribute">Attribute</option>
                <option value="type">Type</option>
              </select>
            </div>

            <div class="card-toolbar-group">
              <label for="sortOrderSelect">Order</label>
              <select id="sortOrderSelect" class="card-search-select">
                <option value="asc">Asc</option>
                <option value="desc">Desc</option>
              </select>
            </div>

            <button id="applyFiltersButton" class="menu-button card-toolbar-button" type="button">
              Apply
            </button>
          </div>

          <div id="cardResultsMeta" class="card-results-meta">
            Loading cards...
          </div>

          <div id="cardList" class="card-list" aria-live="polite"></div>

          <div class="card-results-actions">
            <button id="loadMoreButton" class="menu-button card-load-more-button" type="button">
              Load More
            </button>
          </div>
        </section>

        <aside class="card-filters-panel">
          <div class="card-filters-header">
            <h2>Filters</h2>
          </div>

          <div class="card-filter-stack">
            <div class="card-filter-field">
              <label for="scopeFilter">Binder</label>
              <select id="scopeFilter" class="card-search-select">
                <option value="all">All Cards</option>
                <option value="binder">Player Binder</option>
              </select>
            </div>

            <div class="card-filter-field">
              <label for="playerFilter">Player</label>
              <select id="playerFilter" class="card-search-select" disabled>
                <option value="">Select Player</option>
              </select>
            </div>

            <div class="card-filter-field">
              <label for="cardSearchInput">Search Cards</label>
              <input id="cardSearchInput" class="card-search-input" type="text" placeholder="Search cards..." />
            </div>

            <div class="card-filter-field">
              <label for="typeFilter">Type</label>
              <select id="typeFilter" class="card-search-select">
                <option value="">All</option>
                <option value="Monster">Monster</option>
                <option value="Spell">Spell</option>
                <option value="Trap">Trap</option>
              </select>
            </div>

            <div class="card-filter-field">
              <label for="attributeFilter">Attribute</label>
              <select id="attributeFilter" class="card-search-select">
                <option value="">All</option>
                <option value="DARK">DARK</option>
                <option value="LIGHT">LIGHT</option>
                <option value="EARTH">EARTH</option>
                <option value="WATER">WATER</option>
                <option value="FIRE">FIRE</option>
                <option value="WIND">WIND</option>
                <option value="DIVINE">DIVINE</option>
              </select>
            </div>

            <div class="card-filter-field">
              <label for="levelFilter">Level / Rank / Link</label>
              <input id="levelFilter" class="card-search-input" type="number" min="0" placeholder="Any" />
            </div>

            <div class="card-double-field">
              <div class="card-filter-field">
                <label for="atkMinFilter">Min ATK</label>
                <input id="atkMinFilter" class="card-search-input" type="number" placeholder="0" />
              </div>

              <div class="card-filter-field">
                <label for="atkMaxFilter">Max ATK</label>
                <input id="atkMaxFilter" class="card-search-input" type="number" placeholder="9999" />
              </div>
            </div>

            <div class="card-double-field">
              <div class="card-filter-field">
                <label for="defMinFilter">Min DEF</label>
                <input id="defMinFilter" class="card-search-input" type="number" placeholder="0" />
              </div>

              <div class="card-filter-field">
                <label for="defMaxFilter">Max DEF</label>
                <input id="defMaxFilter" class="card-search-input" type="number" placeholder="9999" />
              </div>
            </div>

            <div class="card-filter-actions">
              <button id="clearFiltersButton" class="menu-button card-secondary-button" type="button">
                Clear Filters
              </button>
            </div>
          </div>
        </aside>

      </section>
    </main>
  </div>
</body>
</html>
